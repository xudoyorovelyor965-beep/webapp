<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBDROP</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#0b0f2a,#1a1f4d);
color:white;
text-align:center;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#2b2f55;
align-items:center;
}

.uc-box{
background:linear-gradient(45deg,#ffcc00,#ff9900);
padding:8px 15px;
border-radius:20px;
font-weight:bold;
color:black;
box-shadow:0 0 10px gold;
}

/* WHEEL */
.wheel-box{
margin-top:20px;
}

.pointer{
width:0;
height:0;
margin:auto;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:25px solid #ff5c5c;
}

#wheel{
width:260px;
height:260px;
border-radius:50%;
margin:15px auto;
border:8px solid gold;
box-shadow:0 0 30px gold;
background:conic-gradient(
#ffd700 0deg 36deg,
#00c2ff 36deg 72deg,
#4caf50 72deg 108deg,
#ff9800 108deg 144deg,
#9c27b0 144deg 180deg,
#ff4d6d 180deg 216deg,
#00bcd4 216deg 252deg,
#e91e63 252deg 288deg,
#ff5722 288deg 324deg,
#ffc107 324deg 360deg
);
transition:4s;
}

/* BUTTON */
.btn{
background:linear-gradient(45deg,#ffcc00,#ff9900);
border:none;
padding:14px 25px;
border-radius:30px;
font-size:16px;
font-weight:bold;
margin:10px;
box-shadow:0 0 15px gold;
}

/* CARD */
.card{
background:#2b2f55;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#1a1a2e;
display:flex;
justify-content:space-around;
padding:10px;
font-size:20px;
}

.section{display:none}
.active{display:block}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<b>WEBDROP</b>
<div class="uc-box" id="balance">0 UC</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="wheel-box">
<div class="pointer"></div>
<div id="wheel"></div>
<button class="btn" onclick="spin()">Aylantirish</button>
<p id="timer"></p>
</div>

<button class="btn">👤 Do‘st taklif qiling</button>
</div>

<!-- TASK -->
<div id="tasks" class="section">
<div class="card">
<h3>Vazifalar</h3>
<button class="btn" onclick="task()">YouTube</button>
<button class="btn" onclick="task()">Instagram</button>
<button class="btn" onclick="task()">Telegram</button>
</div>
</div>

<!-- MINE -->
<div id="mine" class="section">
<div class="card">
<h3>Ball yig‘ish</h3>
<button class="btn" onclick="clickCoin()">+1 Ball</button>
<p>Ball: <span id="ball">0</span></p>
<button class="btn" onclick="convert()">100 → 1 UC</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
<div class="card">
<h3>UC chiqarish</h3>
<input id="pubg" placeholder="PUBG ID"><br><br>
<button class="btn" onclick="withdraw(60)">60 UC</button>
<button class="btn" onclick="withdraw(120)">120 UC</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="show('tasks')">📋</div>
<div onclick="show('mine')">🎯</div>
<div onclick="show('wallet')">💰</div>
</div>

<script>

/* DATA */
let uc = Number(localStorage.getItem("uc"))||0;
let ball = Number(localStorage.getItem("ball"))||0;
update();

/* UI */
function update(){
document.getElementById("balance").innerText=uc+" UC";
document.getElementById("ball").innerText=ball;
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* SPIN */
function getWin(){
let r=Math.random();
if(r<0.4)return 1;
if(r<0.7)return 2;
if(r<0.85)return 3;
if(r<0.95)return 4;
return 5;
}

function spin(){
let last=localStorage.getItem("spin");

if(last && Date.now()-last<86400000){
alert("1 kunda 1 marta!");
return;
}

let deg=3600+Math.random()*360;
document.getElementById("wheel").style.transform="rotate("+deg+"deg)";

let win=getWin();

setTimeout(()=>{
uc+=win;
localStorage.setItem("uc",uc);
localStorage.setItem("spin",Date.now());
update();
alert(win+" UC yutding");
},4000);
}

/* TIMER */
setInterval(()=>{
let last=localStorage.getItem("spin")||0;
let t=86400000-(Date.now()-last);
if(t<0)t=0;

let h=Math.floor(t/3600000);
let m=Math.floor((t%3600000)/60000);
let s=Math.floor((t%60000)/1000);

document.getElementById("timer").innerText=
h+":"+m+":"+s;
},1000);

/* TASK */
function task(){
uc+=2;
localStorage.setItem("uc",uc);
update();
}

/* CLICK */
function clickCoin(){
ball++;
localStorage.setItem("ball",ball);
update();
}

function convert(){
if(ball<100)return alert("100 ball kerak");

ball-=100;
uc+=1;

localStorage.setItem("ball",ball);
localStorage.setItem("uc",uc);
update();
}

/* WITHDRAW */
function withdraw(amount){
let id=document.getElementById("pubg").value;
if(!id)return alert("ID yoz");

if(uc<amount)return alert("UC yetarli emas");

uc-=amount;
localStorage.setItem("uc",uc);
update();

alert("So‘rov yuborildi");
}

</script>

</body>
  </html>
