<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UC SPIN</title>

<style>
body{margin:0;background:#0b0f2a;color:white;font-family:sans-serif;text-align:center}

/* HEADER */
.header{display:flex;justify-content:space-between;padding:10px;background:#141a3a}
.uc{background:gold;color:black;padding:5px 10px;border-radius:10px}

/* WHEEL */
#wheel{
width:250px;height:250px;border-radius:50%;
margin:20px auto;border:8px solid gold;
background:conic-gradient(red,orange,yellow,green,blue,purple,cyan,pink);
transition:4s;
}

/* BUTTON */
.btn{background:gold;padding:10px;border-radius:15px;margin:5px;border:none}

/* NAV */
.nav{position:fixed;bottom:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px}
.section{display:none}
.active{display:block}
</style>
</head>

<body>

<div class="header">
<b>UC SPIN</b>
<div class="uc" id="balance">0 UC</div>
</div>

<!-- SPIN -->
<div id="home" class="section active">
<div id="wheel"></div>
<button class="btn" onclick="spin()">SPIN</button>
<p id="timer"></p>
</div>

<!-- TASK -->
<div id="tasks" class="section">
<button class="btn" onclick="task()">Vazifa bajar (+2 UC)</button>
</div>

<!-- CLICK -->
<div id="click" class="section">
<h3>Ekranga bos!</h3>
<button class="btn" onclick="clickCoin()">+1 Ball</button>
<p>Ball: <span id="ball">0</span></p>
<button class="btn" onclick="convert()">100 ball → 1 UC</button>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
<input id="pubg" placeholder="PUBG ID"><br>
<button class="btn" onclick="withdraw(60)">60 UC</button>
<button class="btn" onclick="withdraw(120)">120 UC</button>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🎡</div>
<div onclick="show('tasks')">📋</div>
<div onclick="show('click')">👆</div>
<div onclick="show('wallet')">💰</div>
</div>

<script>

/* DATA */
let uc = Number(localStorage.getItem("uc"))||0;
let ball = Number(localStorage.getItem("ball"))||0;
update();

/* UI */
function update(){
document.getElementById("balance").innerText=uc+" UC";
document.getElementById("ball").innerText=ball;
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* 🎡 SPIN */
function getWin(){
let r=Math.random();
if(r<0.4)return 1;
if(r<0.7)return 2;
if(r<0.85)return 3;
if(r<0.95)return 4;
return 5;
}

function spin(){
let last=localStorage.getItem("spin");

if(last && Date.now()-last<86400000){
alert("1 kunda 1 marta!");
return;
}

let deg=3600+Math.random()*360;
document.getElementById("wheel").style.transform="rotate("+deg+"deg)";

let win=getWin();

setTimeout(()=>{
uc+=win;
localStorage.setItem("uc",uc);
localStorage.setItem("spin",Date.now());
update();
alert(win+" UC yutding");
},4000);
}

/* TIMER */
setInterval(()=>{
let last=localStorage.getItem("spin")||0;
let t=86400000-(Date.now()-last);
if(t<0)t=0;

let h=Math.floor(t/3600000);
let m=Math.floor((t%3600000)/60000);
let s=Math.floor((t%60000)/1000);

document.getElementById("timer").innerText=
h+":"+m+":"+s;
},1000);

/* TASK */
function task(){
uc+=2;
localStorage.setItem("uc",uc);
update();
}

/* CLICK */
function clickCoin(){
ball++;
localStorage.setItem("ball",ball);
update();
}

function convert(){
if(ball<100)return alert("100 ball kerak");

ball-=100;
uc+=1;

localStorage.setItem("ball",ball);
localStorage.setItem("uc",uc);
update();
}

/* WALLET */
function withdraw(amount){
let id=document.getElementById("pubg").value;
if(!id)return alert("ID yoz");

if(uc<amount)return alert("UC yetarli emas");

uc-=amount;
localStorage.setItem("uc",uc);
update();

/* TELEGRAM */
fetch("https://api.telegram.org/botBOT_TOKEN/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"ADMIN_CHAT_ID",
text:`UC SO‘ROV\nID:${id}\nUC:${amount}`
})
});

alert("Adminga yuborildi");
}

</script>

</body>
</html>
