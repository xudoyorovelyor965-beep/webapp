<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBDROP</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0c1226;
  color:white;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1a1f3c;
}

.uc{
  background:gold;
  color:black;
  padding:5px 10px;
  border-radius:10px;
}

.spin-box{
  margin-top:20px;
}

#wheel{
  width:250px;
  height:250px;
  border-radius:50%;
  border:8px solid gold;
  transition:3s;
}

.btn{
  background:gold;
  padding:12px;
  border-radius:20px;
  margin:10px;
  color:black;
  font-weight:bold;
}

.card{
  background:#1a1f3c;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

input{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:none;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>WEBDROP</b>
  <div class="uc" id="balance">0 UC</div>
</div>

<div class="spin-box">
  <img id="wheel" src="https://i.imgur.com/6X4QZ5T.png">
  <br>
  <button class="btn" onclick="spin()">SPIN</button>
</div>

<div class="card">
  <h3>Do‘st taklif</h3>
  <p id="refLink"></p>
</div>

<div class="card">
  <h3>Vazifalar</h3>
  <button class="btn" onclick="openLink('youtube')">YouTube</button>
  <button class="btn" onclick="openLink('instagram')">Instagram</button>
  <button class="btn" onclick="openLink('telegram')">Telegram</button>
</div>

<div class="card">
  <h3>UC olish</h3>
  <input id="pubg" placeholder="PUBG ID">
  <br><br>
  <button class="btn" onclick="withdraw(60)">60 UC</button>
  <button class="btn" onclick="withdraw(120)">120 UC</button>
</div>

<div class="card">
  <h3>Reyting</h3>
  <div id="top"></div>
</div>

<div class="bottom">
  <div>Asosiy</div>
  <div>Vazifalar</div>
  <div>Mine</div>
  <div>Reyting</div>
  <div>Hamyon</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
/* 🔥 BU YERGA O‘ZINGNI FIREBASE */
const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "xxx",
  databaseURL: "xxx",
  projectId: "xxx",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* USER */
let user = localStorage.getItem("user");
if(!user){
  user = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("user", user);
}

document.getElementById("refLink").innerText =
location.href + "?ref=" + user;

/* LOAD BALANCE */
function load(){
  db.ref("users/"+user).on("value", snap=>{
    let data = snap.val() || {coin:0};
    document.getElementById("balance").innerText =
    data.coin + " UC";
  });
}
load();

/* SPIN */
function spin(){
  let deg = Math.floor(Math.random()*3600);
  document.getElementById("wheel").style.transform =
  "rotate("+deg+"deg)";

  let win = Math.floor(Math.random()*10)+1;

  setTimeout(()=>{
    db.ref("users/"+user+"/coin")
    .transaction(c=> (c||0)+win);
    alert("Yutding: "+win+" UC");
  },3000);
}

/* VAZIFA LINK */
function openLink(type){
  if(type=="youtube") window.open("https://youtube.com");
  if(type=="instagram") window.open("https://instagram.com");
  if(type=="telegram") window.open("https://t.me");

  db.ref("users/"+user+"/coin")
  .transaction(c=> (c||0)+2);
}

/* UC CHIQARISH */
function withdraw(amount){
  let pubg = document.getElementById("pubg").value;
  if(!pubg) return alert("ID yoz");

  db.ref("users/"+user+"/coin").once("value").then(snap=>{
    let coin = snap.val()||0;

    if(coin < amount) return alert("UC yetarli emas");

    db.ref("users/"+user+"/coin").set(coin-amount);

    sendToAdmin(pubg, amount);
    alert("So‘rov yuborildi");
  });
}

/* TELEGRAM BOT */
function sendToAdmin(id, amount){
  let text = "Yangi UC so‘rov\nID: "+id+"\nUC: "+amount;

  fetch("https://api.telegram.org/botBOT_TOKEN/sendMessage",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:"ADMIN_CHAT_ID",
      text:text
    })
  });
}

/* TOP USERS */
db.ref("users").on("value", snap=>{
  let data = snap.val() || {};
  let arr = Object.keys(data).map(k=>{
    return {id:k, coin:data[k].coin||0};
  });

  arr.sort((a,b)=>b.coin-a.coin);

  let html="";
  arr.slice(0,5).forEach((u,i)=>{
    html += `<div>#${i+1} ${u.id} - ${u.coin} UC</div>`;
  });

  document.getElementById("top").innerHTML = html;
});
</script>

</body>
</html>
