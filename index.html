<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBDROP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#0b0f2a, #070a1f);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1b1f3a;
}

.uc {
  background: linear-gradient(gold, orange);
  color: black;
  padding: 8px 15px;
  border-radius: 20px;
  font-weight: bold;
}

/* PAGES */
.page {
  display: none;
  padding: 15px;
}

.active {
  display: block;
}

/* SPIN */
canvas {
  border-radius: 50%;
  box-shadow: 0 0 40px gold;
}

button {
  margin-top: 20px;
  padding: 15px 40px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(gold, orange);
  font-weight: bold;
}

/* CARD */
.card {
  background: #1b1f3a;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #1b1f3a;
  padding: 10px 0;
}

.menu div {
  font-size: 12px;
  cursor: pointer;
}

.active-tab {
  color: gold;
}
</style>
</head>

<body>

<div class="header">
  <b>WEBDROP</b>
  <div class="uc">💰 <span id="balance">0</span> UC</div>
</div>

<!-- ASOSIY -->
<div id="home" class="page active">
  <center>
    <canvas id="wheel" width="300" height="300"></canvas>
    <br>
    <button onclick="spin()">Aylantirish</button>
    <p id="msg"></p>
  </center>
</div>

<!-- VAZIFALAR -->
<div id="tasks" class="page">
  <div class="card">
    <h3>Do'st taklif qiling</h3>
    <p>Har bir do‘st uchun spin olasiz</p>
    <button>Taklif qilish</button>
  </div>
</div>

<!-- MINE -->
<div id="mine" class="page">
  <div class="card">Joriy clicklar: 101</div>
  <div class="card">Jami clicklar: 101</div>
  <div class="card">Ball balans: 101</div>
</div>

<!-- REYTING -->
<div id="rating" class="page">
  <div class="card">#1 Shoxrux - 192 UC</div>
  <div class="card">#2 Sunnatbek - 187 UC</div>
</div>

<!-- HAMYON -->
<div id="wallet" class="page">
  <div class="card">
    <h3>8 UC</h3>
    <input placeholder="PUBG ID">
    <br><br>
    <button>So‘rov yuborish</button>
  </div>
</div>

<!-- MENU -->
<div class="menu">
  <div onclick="openPage('home')">🏠<br>Asosiy</div>
  <div onclick="openPage('tasks')">📋<br>Vazifalar</div>
  <div onclick="openPage('mine')">👤<br>Mine</div>
  <div onclick="openPage('rating')">🏆<br>Reyting</div>
  <div onclick="openPage('wallet')">💼<br>Hamyon</div>
</div>

<script>
// PAGE SWITCH
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// WHEEL
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [0,1,2,3,4,5,10,50];
let angle = 0;

function drawWheel(){
  let arc = Math.PI*2/prizes.length;
  for(let i=0;i<prizes.length;i++){
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i*40},80%,60%)`;
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,arc*i,arc*(i+1));
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(prizes[i]+" UC",150+Math.cos(arc*i)*80,150+Math.sin(arc*i)*80);
  }
}

drawWheel();

function spin(){
  let win = prizes[Math.floor(Math.random()*prizes.length)];
  let balance = parseInt(localStorage.getItem("balance")||0);
  balance += win;

  localStorage.setItem("balance", balance);
  document.getElementById("balance").innerText = balance;
  document.getElementById("msg").innerText = "Yutding: "+win+" UC";
}

document.getElementById("balance").innerText = localStorage.getItem("balance")||0;
</script>

</body>
</html>
