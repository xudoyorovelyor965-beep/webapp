<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Bonus App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 10px;
}

.container {
    padding: 15px;
}

/* BARABAN */
.wheel {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    margin: 20px auto;
    background: conic-gradient(
        #ff0000 0% 25%,
        #00ff00 25% 50%,
        #0000ff 50% 75%,
        #ffff00 75% 100%
    );
    transition: transform 4s ease-out;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #111827;
    padding: 10px 0;
}

.menu div {
    font-size: 12px;
}

.big {
    font-size: 18px;
    font-weight: bold;
}

/* CARDS */
.card {
    background: #1e293b;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>🎁 UC BONUS</h1>

<div class="container">

<div class="card">
<div class="big">🎡 Baraban</div>
<div class="wheel" id="wheel"></div>
<button onclick="spin()">Aylantirish</button>
</div>

<div class="card">
<div class="big">💰 Balans: <span id="balans">0</span> UC</div>
</div>

<div class="card">
<div class="big">👥 Do‘st taklif qilish</div>
<p>Har do‘st = 10 UC</p>
<button onclick="invite()">Taklif qilish</button>
</div>

<div class="card">
<div class="big">💳 Hamyon</div>
<button onclick="withdraw(60)">60 UC</button>
<button onclick="withdraw(120)">120 UC</button>
</div>

</div>

<div class="menu">
<div>🏠<br>Asosiy</div>
<div>🎯<br>Vazifalar</div>
<div>⛏<br>Mine</div>
<div>🏆<br>Reyting</div>
<div>💳<br>Hamyon</div>
</div>

<script>
let balans = localStorage.getItem("balans") || 0;
document.getElementById("balans").innerText = balans;

function spin() {
    let last = localStorage.getItem("lastSpin");
    let now = Date.now();

    if (last && now - last < 86400000) {
        alert("❌ Bugun aylantirding!");
        return;
    }

    let wheel = document.getElementById("wheel");
    let deg = Math.floor(Math.random() * 3600);
    wheel.style.transform = "rotate(" + deg + "deg)";

    let reward = Math.random() < 0.8 ? 5 : 50; // kichik ko‘p tushadi
    balans = Number(balans) + reward;

    setTimeout(() => {
        alert("🎉 Yutding: " + reward + " UC");
        document.getElementById("balans").innerText = balans;
        localStorage.setItem("balans", balans);
        localStorage.setItem("lastSpin", now);
    }, 4000);
}

function invite() {
    balans = Number(balans) + 10;
    alert("Do‘st qo‘shildi +10 UC");
    document.getElementById("balans").innerText = balans;
    localStorage.setItem("balans", balans);
}

function withdraw(amount) {
    if (balans >= amount) {
        balans -= amount;
        alert(amount + " UC chiqarildi (admin orqali)");
    } else {
        alert("❌ Yetarli UC yo‘q");
    }
    document.getElementById("balans").innerText = balans;
    localStorage.setItem("balans", balans);
}
</script>

</body>
</html>
