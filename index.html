<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>UC SPIN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111a2f;
  font-weight:bold;
}

.uc{
  background:gold;
  color:black;
  padding:5px 12px;
  border-radius:20px;
}

#wheel{
  width:300px;
  height:300px;
  border-radius 100%;
  border:8px solid gold;
  margin:30px auto;
  position:relative;
  overflow:hidden;
}

.segment{
  position:absolute;
  width:100%;
  height:100%;
  transform-origin:100% 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:200px;
}

.arrow{
  width:0;
  height:0;
  border-left:50px solid transparent;
  border-right:50px solid transparent;
  border-bottom:50px solid red;
  margin:auto;
}

button{
  padding:12px 25px;
  background:gold;
  border:none;
  border-radius:25px;
  font-weight:bold;
  margin:10px;
  cursor:pointer;
}

input{
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111a2f;
  padding:10px 0;
}

.section{
  display:none;
}

.active{
  display:block;
}

.card{
  background:#1b2540;
  margin:10px;
  padding:15px;
  border-radius:15px;
}
</style>

</head>

<body>

<div class="header">
  <div>💰 UC SPIN</div>
  <div class="uc" id="balance">0 UC</div>
</div>

<!-- ASOSIY -->
<div id="home" class="section active">
  <div class="arrow"></div>
  <div id="wheel"></div>
  <button onclick="spin()">🎡 SPIN</button>

  <div class="card">
    <h3>👥 Do‘st taklif qilish</h3>
    <button onclick="invite()">Taklif qilish</button>
  </div>
</div>

<!-- VAZIFALAR -->
<div id="tasks" class="section">
  <div class="card">
    YouTube <br>
    <button onclick="task()">O‘tish</button>
  </div>

  <div class="card">
    Instagram <br>
    <button onclick="task()">O‘tish</button>
  </div>

  <div class="card">
    Telegram <br>
    <button onclick="task()">O‘tish</button>
  </div>
</div>

<!-- PROFIL -->
<div id="profile" class="section">
  <div class="card">Joriy click: <span id="clicks">0</span></div>
  <div class="card">Ball: <span id="points">0</span></div>
</div>

<!-- REYTING -->
<div id="rating" class="section">
  <div class="card">#1 User - 200 UC</div>
  <div class="card">#2 User - 150 UC</div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">Balans: <span id="walletUC">0</span> UC</div>

  <input placeholder="PUBG ID">

  <button onclick="alert('So‘rov yuborildi')">UC olish</button>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('tasks')">📋</div>
  <div onclick="show('profile')">👤</div>
  <div onclick="show('rating')">🏆</div>
  <div onclick="show('wallet')">💰</div>
</div>

<script>
// ===== BARABAN DATA =====
const display = [0,2,1,4,5,3,50,300,100];
const real = [2,1,4,5,3];

let balance = 0;
let clicks = 0;
let points = 0;

// ===== BARABAN CHIZISH =====
const wheel = document.getElementById("wheel");
const colors = ["#ff5252","#40c4ff","#69f0ae","#ffd740","#ff80ab","#b388ff","#ffab40","#18ffff","#ffff8d"];

display.forEach((val,i)=>{
  const div = document.createElement("div");
  div.className="segment";
  div.style.background=colors[i];
  div.style.transform=`rotate(${i*40}deg) skewY(-50deg)`;
  div.innerHTML=`<span style="transform:skewY(50deg) rotate(-${i*40}deg)">${val} UC</span>`;
  wheel.appendChild(div);
});

// ===== SPIN =====
function spin(){
  const last = localStorage.getItem("spin");

  if(last && Date.now()-last < 86400000){
    alert("⏳ Ertaga spin qilasiz");
    return;
  }

  const win = real[Math.floor(Math.random()*real.length)];
  balance += win;

  document.getElementById("balance").innerText = balance+" UC";
  document.getElementById("walletUC").innerText = balance;

  localStorage.setItem("spin", Date.now());

  alert("🎉 Siz yutdingiz: "+win+" UC");
}

// ===== TASK =====
function task(){
  clicks++;
  points += 10;

  document.getElementById("clicks").innerText = clicks;
  document.getElementById("points").innerText = points;

  alert("+10 ball");
}

// ===== INVITE =====
function invite(){
  alert("Referal link yuborildi 🚀");
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
