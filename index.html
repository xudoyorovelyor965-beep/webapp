<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WEBDROP</title>

<style>
body {
  margin:0;
  background:#0c1022;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1a1f3a;
}

.balance {
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

/* WHEEL */
#wheel {
  width:300px;
  height:300px;
  border-radius:50%;
  border:8px solid gold;
  margin:30px auto;
  transition:4s;
}

/* BUTTON */
button {
  background:gold;
  border:none;
  padding:12px 25px;
  border-radius:20px;
  font-size:16px;
  cursor:pointer;
}

/* CARD */
.card {
  background:#1a1f3a;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* INPUT */
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}

</style>
</head>

<body>

<div class="header">
  <h3>WEBDROP</h3>
  <div class="balance" id="balance">0 UC</div>
</div>

<h3>🎡 Spin</h3>

<img id="wheel" src="https://i.imgur.com/4NZ6uLY.png">

<br>
<button onclick="spin()">SPIN</button>

<div class="card">
  <h3>👥 Do‘st taklif</h3>
  <p id="ref">link...</p>
</div>

<div class="card">
  <h3>📋 Vazifalar</h3>
  <button onclick="task('yt')">YouTube</button>
  <button onclick="task('ig')">Instagram</button>
  <button onclick="task('tg')">Telegram</button>
</div>

<div class="card">
  <h3>💳 UC olish</h3>
  <input id="pubg" placeholder="PUBG ID">
  <br>
  <button onclick="withdraw(60)">60 UC</button>
  <button onclick="withdraw(120)">120 UC</button>
</div>

<div class="card">
  <h3>🏆 Reyting</h3>
  <div id="top"></div>
</div>

<script type="module">

// 🔥 FIREBASE CONFIG (o‘zing qo‘yasan)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT.firebaseapp.com",
  databaseURL: "https://PROJECT-default-rtdb.firebaseio.com",
  projectId: "PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USER ID
const user = localStorage.getItem("uid") || Date.now();
localStorage.setItem("uid", user);

// REFERAL
const refLink = location.href + "?ref=" + user;
document.getElementById("ref").innerText = refLink;

// USER LOAD
async function loadUser() {
  const snap = await get(ref(db, "users/" + user));
  if (!snap.exists()) {
    await set(ref(db, "users/" + user), {
      uc: 0,
      clicks: 0,
      ref: 0
    });
  }
  updateUI();
}
loadUser();

// UPDATE UI
async function updateUI() {
  const snap = await get(ref(db, "users/" + user));
  const data = snap.val();
  document.getElementById("balance").innerText = data.uc + " UC";
}

// 🎡 SPIN LOGIKA
const rewards = [2,1,4,5,3];

window.spin = async function() {
  const last = localStorage.getItem("spin");
  const now = Date.now();

  if (last && now - last < 86400000) {
    alert("❌ Ertaga urinib ko‘ring");
    return;
  }

  const win = rewards[Math.floor(Math.random()*rewards.length)];

  // animatsiya
  document.getElementById("wheel").style.transform =
    "rotate(" + (3600 + Math.random()*360) + "deg)";

  setTimeout(async ()=>{
    const userRef = ref(db, "users/" + user);
    const snap = await get(userRef);
    let data = snap.val();

    data.uc += win;

    await update(userRef, data);
    updateUI();

    alert("🎉 Siz yutdingiz: " + win + " UC");

    localStorage.setItem("spin", now);
  },4000);
}

// 📋 TASK
window.task = async function(type){
  const userRef = ref(db, "users/" + user);
  const snap = await get(userRef);
  let data = snap.val();

  data.clicks += 1;
  data.uc += 1;

  await update(userRef, data);
  updateUI();

  alert("✅ +1 UC qo‘shildi");
}

// 💳 UC OLISH
window.withdraw = async function(amount){
  const pubg = document.getElementById("pubg").value;

  if (!pubg) return alert("PUBG ID kiriting");

  const snap = await get(ref(db, "users/" + user));
  let data = snap.val();

  if (data.uc < amount) return alert("UC yetarli emas");

  data.uc -= amount;

  await update(ref(db,"users/"+user), data);

  // ADMIN MESSAGE (Telegramga yuborish uchun)
  alert("✅ So‘rov yuborildi (admin tekshiradi)");

  updateUI();
}

// 🏆 TOP
async function loadTop(){
  const snap = await get(ref(db,"users"));
  let users = snap.val();

  let arr = Object.values(users);
  arr.sort((a,b)=>b.uc - a.uc);

  let html="";
  arr.slice(0,5).forEach((u,i)=>{
    html += `<p>#${i+1} — ${u.uc} UC</p>`;
  });

  document.getElementById("top").innerHTML = html;
}
loadTop();

</script>

</body>
</html>
