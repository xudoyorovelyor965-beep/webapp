<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Spin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f2a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #111;
}

.balance {
  background: gold;
  color: black;
  padding: 5px 12px;
  border-radius: 20px;
}

/* PAGES */
.page { display: none; padding: 15px; }
.active { display: block; }

/* WHEEL */
#wheel {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  margin: 20px auto;
  border: 6px solid gold;
  background: conic-gradient(
    #ff4d4d 0deg 60deg,
    #4d79ff 60deg 120deg,
    #4dff88 120deg 180deg,
    #ffff4d 180deg 240deg,
    #ff944d 240deg 300deg,
    #cc66ff 300deg 360deg
  );
  transition: transform 4s ease-out;
}

/* BUTTON */
button {
  padding: 12px 25px;
  background: linear-gradient(gold, orange);
  border: none;
  border-radius: 25px;
  font-size: 16px;
  margin-top: 10px;
}

/* CARD */
.card {
  background: #1b1f3a;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111;
  padding: 10px 0;
}

.menu div {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <b>WEBDROP</b>
  <div class="balance">💰 <span id="balance">0</span> UC</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div id="wheel"></div>
  <center>
    <button onclick="spin()">Aylantirish</button>
    <p id="msg"></p>
  </center>
</div>

<!-- TASK -->
<div id="tasks" class="page">
  <div class="card">
    👥 Do‘st taklif qiling<br>
    Har bir do‘st uchun +5 UC
    <br><button onclick="invite()">Taklif qilish</button>
  </div>
</div>

<!-- MINE -->
<div id="mine" class="page">
  <div class="card">Jami UC: <span id="balance2">0</span></div>
  <div class="card">Bugungi spin: 1 marta</div>
</div>

<!-- RATING -->
<div id="rating" class="page">
  <div class="card">#1 Ali - 500 UC</div>
  <div class="card">#2 Vali - 320 UC</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    60 UC chiqarish<br>
    <input placeholder="PUBG ID">
    <br><button onclick="withdraw(60)">Olish</button>
  </div>

  <div class="card">
    120 UC chiqarish<br>
    <input placeholder="PUBG ID">
    <br><button onclick="withdraw(120)">Olish</button>
  </div>
</div>

<!-- MENU -->
<div class="menu">
  <div onclick="openPage('home')">🏠<br>Asosiy</div>
  <div onclick="openPage('tasks')">📋<br>Vazifalar</div>
  <div onclick="openPage('mine')">👤<br>Mine</div>
  <div onclick="openPage('rating')">🏆<br>Reyting</div>
  <div onclick="openPage('wallet')">💼<br>Hamyon</div>
</div>

<script>
let balance = parseInt(localStorage.getItem("balance")) || 0;
document.getElementById("balance").innerText = balance;
document.getElementById("balance2").innerText = balance;

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

let current = 0;

function spin(){
  let deg = Math.floor(Math.random()*2000)+2000;
  current += deg;

  document.getElementById("wheel").style.transform =
    "rotate("+current+"deg)";

  let prizes = [0,2,5,10,20];
  let win = prizes[Math.floor(Math.random()*prizes.length)];

  setTimeout(()=>{
    balance += win;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
    document.getElementById("balance2").innerText = balance;
    document.getElementById("msg").innerText = "🎉 Siz yutdingiz: "+win+" UC";
  },4000);
}

function invite(){
  balance += 5;
  localStorage.setItem("balance", balance);
  document.getElementById("balance").innerText = balance;
  alert("Do‘st qo‘shildi +5 UC");
}

function withdraw(amount){
  if(balance < amount){
    alert("Yetarli UC yo‘q");
    return;
  }
  balance -= amount;
  localStorage.setItem("balance", balance);
  document.getElementById("balance").innerText = balance;
  alert(amount+" UC chiqarildi!");
}
</script>

</body>
</html>
