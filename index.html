<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Spin Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1020;
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  padding:15px;
  background:#1a1f3a;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.balance-box {
  background:gold;
  color:black;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
}

/* WHEEL */
.wheel-container {
  margin-top:30px;
}

#wheel {
  width:260px;
  height:260px;
  border-radius:50%;
  border:6px solid gold;
  margin:auto;
  transition:transform 4s ease-out;
}

/* POINTER */
.pointer {
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid red;
  margin:10px auto;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}

/* INPUT */
input {
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  border:none;
  width:70%;
}

/* CARD */
.card {
  background:#1a1f3a;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1f3a;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div {
  color:gray;
}

.nav .active {
  color:gold;
}
</style>
</head>

<body>

<div class="header">
  <h3>💰 UC SPIN</h3>
  <div class="balance-box" id="balance">0 UC</div>
</div>

<div class="wheel-container">
  <div class="pointer"></div>

  <canvas id="wheel" width="260" height="260"></canvas>

  <button class="btn" onclick="spin()">🎡 SPIN</button>

  <p id="timer"></p>

  <input placeholder="PUBG ID yoz">
  <button class="btn">💳 UC olish</button>
</div>

<div class="card">
  <h3>👥 Do‘st taklif qilish</h3>
  <button class="btn" onclick="invite()">Taklif qilish</button>
</div>

<div class="nav">
  <div class="active">🏠 Asosiy</div>
  <div>📋 Vazifalar</div>
  <div>👤 Mine</div>
  <div>🏆 Reyting</div>
  <div>💳 Hamyon</div>
</div>

<script>
let balance = 0;
let canSpin = true;

// KO‘RINADIGAN
const segments = [
  "0", "2", "1", "4", "5", "3", "50", "300", "100"
];

// FAqat tushadigan
const realRewards = [0,2,1,4,5,3];

// CHIZISH
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const colors = [
  "#ff4d4d","#4dd2ff","#33ff77",
  "#ffd633","#ff66ff","#66ccff",
  "#ff9933","#cc66ff","#66ffcc"
];

function drawWheel() {
  let angle = 2 * Math.PI / segments.length;

  for (let i = 0; i < segments.length; i++) {
    ctx.beginPath();
    ctx.moveTo(130,130);
    ctx.arc(130,130,130, i*angle, (i+1)*angle);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*angle + angle/2);
    ctx.fillStyle = "black";
    ctx.font = "bold 14px Arial";
    ctx.fillText(segments[i]+" UC", 60, 5);
    ctx.restore();
  }
}

drawWheel();

// SPIN
function spin() {
  if (!canSpin) {
    alert("❌ Bugun aylantirgansiz!");
    return;
  }

  canSpin = false;

  let reward = realRewards[Math.floor(Math.random()*realRewards.length)];
  let index = segments.indexOf(reward.toString());

  let deg = 360 * 5 + (index * (360 / segments.length));

  canvas.style.transform = "rotate(" + deg + "deg)";

  setTimeout(() => {
    balance += reward;
    document.getElementById("balance").innerText = balance + " UC";
    alert("🎉 Siz yutdingiz: " + reward + " UC");

    localStorage.setItem("spinTime", Date.now());
  }, 4000);
}

// 24 SOAT CHECK
window.onload = function() {
  let t = localStorage.getItem("spinTime");

  if (t) {
    let diff = Date.now() - t;
    let h = diff / (1000*60*60);

    if (h < 24) {
      canSpin = false;
      document.getElementById("timer").innerText = "⏳ Keyingi spin: 24 soat";
    }
  }
}

// INVITE
function invite() {
  balance += 1;
  document.getElementById("balance").innerText = balance + " UC";
  alert("🎁 1 UC qo‘shildi");
}
</script>

</body>
</html>
