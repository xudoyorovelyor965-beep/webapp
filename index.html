<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>UC SPIN PRO</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

#wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 10px solid gold;
  margin: 20px auto;
  transition: transform 3s ease-out;
  background: conic-gradient(
    #ff0000 0deg 60deg,
    #00ffcc 60deg 120deg,
    #ffcc00 120deg 180deg,
    #ff00ff 180deg 240deg,
    #00ff00 240deg 300deg,
    #00ccff 300deg 360deg
  );
}

button {
  padding: 10px 20px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
}

.box {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 UC SPIN PRO</h1>

<div id="wheel"></div>

<button onclick="spin()">🎡 SPIN</button>

<div class="box">
<h2>💰 Balance: <span id="balance">0</span> UC</h2>
<h3>⏱ Keyingi aylanish: <span id="timer">00:00:00</span></h3>
</div>

<div class="box">
<input id="userId" placeholder="PUBG ID yoz">
<button onclick="withdraw()">💸 UC olish</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzQffxHgkohxAy_zPecwQFzkdQzHmthxQ",
  authDomain: "uc-spin-68a06.firebaseapp.com",
  projectId: "uc-spin-68a06",
  storageBucket: "uc-spin-68a06.firebasestorage.app",
  messagingSenderId: "170537601588",
  appId: "1:170537601588:web:ea2eb989d7c27641ba1861",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("user") || Math.random().toString(36).substring(7);
localStorage.setItem("user", user);

const balanceEl = document.getElementById("balance");
const timerEl = document.getElementById("timer");

let lastSpin = 0;

async function loadUser() {
  const ref = doc(db, "users", user);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();
    balanceEl.innerText = data.balance || 0;
    lastSpin = data.lastSpin || 0;
  } else {
    await setDoc(ref, { balance: 0, lastSpin: 0 });
  }
}

loadUser();

window.spin = async function () {
  let now = Date.now();

  if (now - lastSpin < 86400000) {
    alert("⛔ 24 soat kuting!");
    return;
  }

  let deg = Math.floor(Math.random() * 360) + 720;
  document.getElementById("wheel").style.transform = `rotate(${deg}deg)`;

  let uc = Math.floor(Math.random() * 50) + 10;

  setTimeout(async () => {
    balanceEl.innerText = Number(balanceEl.innerText) + uc;
    lastSpin = now;

    await updateDoc(doc(db, "users", user), {
      balance: Number(balanceEl.innerText),
      lastSpin: lastSpin
    });

    alert("🎉 Siz yutdingiz: " + uc + " UC");
  }, 3000);
};

setInterval(() => {
  let now = Date.now();
  let diff = 86400000 - (now - lastSpin);

  if (diff < 0) {
    timerEl.innerText = "READY";
    return;
  }

  let h = Math.floor(diff / 3600000);
  let m = Math.floor((diff % 3600000) / 60000);
  let s = Math.floor((diff % 60000) / 1000);

  timerEl.innerText = `${h}:${m}:${s}`;
}, 1000);

window.withdraw = function () {
  let id = document.getElementById("userId").value;

  if (!id) {
    alert("ID yoz!");
    return;
  }

  let bal = Number(balanceEl.innerText);

  if (bal < 60) {
    alert("⛔ Kamida 60 UC kerak!");
    return;
  }

  let text = `ID: ${id} UC: ${bal}`;
  window.open(`https://t.me/Doniyor_0819?text=${encodeURIComponent(text)}`);

  alert("Adminga yuborildi!");
};
</script>

</body>
</html>
