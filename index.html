<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBDROP</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b0f2a;
  color:white;
  text-align:center;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1b1f3a;
}

.uc {
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

.wheel {
  width:260px;
  height:260px;
  border-radius:50%;
  margin:20px auto;
  border:8px solid gold;
  background:conic-gradient(
    #f1c40f 0deg 40deg,
    #2ecc71 40deg 80deg,
    #3498db 80deg 120deg,
    #9b59b6 120deg 160deg,
    #e67e22 160deg 200deg,
    #e74c3c 200deg 240deg,
    #1abc9c 240deg 280deg,
    #f39c12 280deg 320deg,
    #ecf0f1 320deg 360deg
  );
  transition: transform 4s ease-out;
}

button {
  background:gold;
  border:none;
  padding:12px 25px;
  border-radius:25px;
  margin:10px;
  font-weight:bold;
}

.card {
  background:#1b1f3a;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#1b1f3a;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>WEBDROP</b>
  <div class="uc" id="balance">0 UC</div>
</div>

<h3>🎡 Spin</h3>
<div id="wheel" class="wheel"></div>
<button onclick="spin()">SPIN</button>

<div class="card">
  👥 Referal link:
  <p id="ref"></p>
</div>

<div class="card">
  📋 Vazifalar <br><br>
  <button onclick="task()">YouTube</button>
  <button onclick="task()">Instagram</button>
  <button onclick="task()">Telegram</button>
</div>

<div class="card">
  💳 UC olish <br><br>
  <input id="pubg" placeholder="PUBG ID"><br><br>
  <button onclick="requestUC(60)">60 UC</button>
  <button onclick="requestUC(120)">120 UC</button>
</div>

<div class="card">
  🏆 Reyting
  <p id="top"></p>
</div>

<div class="nav">
  <span>🏠</span>
  <span>📋</span>
  <span>👤</span>
  <span>🏆</span>
  <span>💰</span>
</div>

<script>
// LOCAL DATA
let balance = localStorage.getItem("uc") || 0;
document.getElementById("balance").innerText = balance + " UC";

// REFERAL
let id = localStorage.getItem("id");
if(!id){
  id = Math.floor(Math.random()*999999);
  localStorage.setItem("id", id);
}
document.getElementById("ref").innerText =
location.href + "?ref=" + id;

// SPIN LOGIKA
const rewards = [2,1,4,5,3];

function spin(){
  let last = localStorage.getItem("spin");
  let now = Date.now();

  if(last && now - last < 86400000){
    alert("Ertaga urinib ko‘ring");
    return;
  }

  let win = rewards[Math.floor(Math.random()*rewards.length)];

  let deg = 3600 + Math.random()*360;
  document.getElementById("wheel").style.transform =
    "rotate("+deg+"deg)";

  setTimeout(()=>{
    balance = Number(balance) + win;
    localStorage.setItem("uc", balance);
    localStorage.setItem("spin", now);
    document.getElementById("balance").innerText = balance+" UC";
    alert("Yutding: "+win+" UC");
  },4000);
}

// TASK
function task(){
  balance = Number(balance) + 1;
  localStorage.setItem("uc", balance);
  document.getElementById("balance").innerText = balance+" UC";
}

// UC REQUEST (ADMIN)
function requestUC(amount){
  let pubg = document.getElementById("pubg").value;
  if(!pubg) return alert("ID kiriting");

  let msg = "UC so‘rov\nID: "+pubg+"\nAmount: "+amount;
  window.open("https://t.me/Doniyor_0819?text="+encodeURIComponent(msg));
}

// FAKE REYTING
document.getElementById("top").innerHTML =
"#1 200 UC<br>#2 150 UC<br>#3 100 UC";

</script>

</body>
</html>
