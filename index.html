<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Spin Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1 {
  margin-top:20px;
}

.wheel {
  width:250px;
  height:250px;
  border-radius:50%;
  border:6px solid gold;
  margin:20px auto;
  background: conic-gradient(
    red 0deg 60deg,
    cyan 60deg 120deg,
    yellow 120deg 180deg,
    pink 180deg 240deg,
    lime 240deg 300deg,
    orange 300deg 360deg
  );
  transition: transform 4s ease-out;
}

button {
  background:gold;
  border:none;
  padding:12px 25px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

</style>
</head>

<body>

<h1>🔥 UC SPIN PRO</h1>

<div class="wheel" id="wheel"></div>

<button onclick="spin()">🎯 SPIN</button>

<p>💰 Balance: <span id="balance">0</span> UC</p>
<p id="timer"></p>

<input type="text" placeholder="PUBG ID yoz">
<button onclick="alert('Yuborildi!')">💸 UC olish</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzQffxHgkohxAy_zPecwQFzkdQzHmthxQ",
  authDomain: "uc-spin-68a06.firebaseapp.com",
  projectId: "uc-spin-68a06",
  storageBucket: "uc-spin-68a06.firebasestorage.app",
  messagingSenderId: "170537601588",
  appId: "1:170537601588:web:ea2eb989d7c27641ba1861"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = "user1";
let balance = 0;

async function loadData() {
  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    balance = snap.data().balance;
  } else {
    balance = 10;
    await setDoc(ref, { balance: 10 });
  }

  document.getElementById("balance").innerText = balance;
}

loadData();

let spinning = false;

window.spin = async function() {
  if (spinning) return;
  spinning = true;

  let deg = Math.floor(3600 + Math.random()*360);
  document.getElementById("wheel").style.transform = "rotate(" + deg + "deg)";

  setTimeout(async () => {
    let win = Math.floor(Math.random()*10) + 1;
    balance += win;

    document.getElementById("balance").innerText = balance;

    await setDoc(doc(db, "users", userId), { balance });

    alert("🎉 Siz " + win + " UC yutdingiz!");

    spinning = false;
  }, 4000);
};
</script>

</body>
</html>
